# Render Blueprint — API + admin + client portal (all on Render).
# Docs: https://render.com/docs/blueprint-spec
#
# Web API (rootDir server/):
#   Build produces client/dist; Express serves /api + admin SPA. Do not deploy repo root as the Node app.
#
# After first deploy, set JWT_SECRET on vizodesk-api (Dashboard → Environment).
#
# URLs use service names: https://<name>.onrender.com
# If you rename a service, update VITE_API_URL on both static sites and CLIENT_URL / PORTAL_URL on the API.
#
# Free tier: API sleeps when idle (~30s first wake). SQLite may reset on redeploy unless you add a disk + DB_PATH.

version: "1"
services:
  - type: web
    name: vizodesk-api
    runtime: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: cd ../client && npm install && npm run build && cd ../server && npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://vizodesk-admin.onrender.com
      - key: PORTAL_URL
        value: https://vizodesk-portal.onrender.com

  - type: web
    name: vizodesk-admin
    runtime: static
    region: oregon
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./client/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://vizodesk-api.onrender.com

  - type: web
    name: vizodesk-portal
    runtime: static
    region: oregon
    rootDir: portal
    buildCommand: npm install && npm run build
    staticPublishPath: ./portal/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://vizodesk-api.onrender.com
